<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông tin cá nhân </title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            display: flex;
            min-height: 100vh;
            background-color: #fbe9e7;
        }
        .sidebar {
            width: 250px;
            background: #b71c1c;
            color: white;
            padding: 15px;
            position: fixed;
            height: 100%;
        }
        .sidebar a {
            color: white;
            text-decoration: none;
            display: block;
            padding: 10px;
            border-radius: 5px;
        }
        .sidebar a:hover, .sidebar a.active {
            background: #ff9800;
            font-weight: bold;
        }
        .content {
            margin-left: 260px;
            padding: 20px;
            width: 100%;
        }
        .header {
            background: #d32f2f;
            padding: 15px;
            text-align: right;
            font-weight: bold;
            color: white;
        }
        .personal-info {
            display: block; 
            margin-left: 50px; 
        }
        .personal-info input {
            width: 80%; 
            padding: 8px; 
            margin: 8px 0; 
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .personal-info .button-group {
            display: flex; 
            justify-content: flex-start; 
            gap: 10px; 
            margin-top: 10px;
        }
        .personal-info button {
            padding: 8px 16px; 
            background: #d32f2f;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .personal-info button:hover {
            background: #b71c1c;
        }
        .personal-info .logout-button {
            margin-top: 15px;
            padding: 8px 16px;
            background: #d32f2f;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: calc(100% - 20px);
            max-width: 300px; 
        }
        .personal-info .logout-button:hover {
            background: #b71c1c;
        }
        .modal {
            display: none; 
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5); /* Nền mờ */
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.3);
            width: 300px;
            text-align: center;
        }
        .modal-content input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .modal-content button {
            padding: 8px 16px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .modal-content .confirm {
            background: #4caf50;
            color: white;
        }
        .modal-content .confirm:hover {
            background: #388e3c;
        }
        .modal-content .cancel {
            background: #f44336;
            color: white;
        }
        .modal-content .cancel:hover {
            background: #d32f2f;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h5 class="mt-3">RẠP CHIẾU PHIM</h5>
        <a href="tongquanadmin.html" onclick="showSection('overview')">Tổng quan</a>
        <a href="quanlynguoidung.html" onclick="showSection('users')">Quản lý người dùng</a>
        <a href="quanlyve.html" onclick="showSection('tickets')">Quản lý vé</a>
        <a href="quanlylichchieuphim.html" onclick="showSection('schedule')">Quản lý lịch chiếu</a>
        <a href="quanlynhanvien.html" onclick="showSection('employees')">Quản lý nhân viên</a>
        <a href="thongke.html" onclick="showSection('stats')">Thống kê</a>
        <a href="quanlyphim.html" onclick="showSection('movies')">Quản lý phim</a>
        <a href="quanlyphongchieu_banquanly.html" onclick="showSection('rooms')">Quản lý phòng chiếu</a>
        <a href="thongtincanhan_banquanly.html" onclick="showSection('rooms')">Thông tin cá nhân</a>
    </div>
    <div class="content">
        
        <div class="personal-info" id="personal-info">
            <h3>Thông tin cá nhân</h3>
            <input type="text" id="name" placeholder="Tên" value="Đặng Thị C">
            <input type="email" id="email" placeholder="Email" value="dangthic@example.com">
            <input type="text" id="phone" placeholder="Số điện thoại" value="0567891234">
            <div class="button-group">
                <button onclick="showChangePasswordModal()">Đổi mật khẩu</button>
                <button onclick="showUpdateInfoModal()">Cập nhật thông tin</button>
                <button onclick="redirectToOverview()">Đóng</button> 
            </div>
            <button class="logout-button" onclick="showLogoutModal()">Đăng xuất</button>
        </div>
    </div>

    <div class="modal" id="change-password-modal">
        <div class="modal-content">
            <h4>Đổi mật khẩu</h4>
            <input type="password" id="current-password" placeholder="Mật khẩu cũ">
            <input type="password" id="new-password" placeholder="Mật khẩu mới">
            <input type="password" id="confirm-new-password" placeholder="Xác nhận mật khẩu mới">
            <button class="confirm" onclick="changePassword()">Lưu</button>
            <button class="cancel" onclick="closeChangePasswordModal()">Hủy</button>
        </div>
    </div>
    <div class="modal" id="update-info-modal">
        <div class="modal-content">
            <h4>Xác nhận cập nhật thông tin?</h4>
            <button class="confirm" onclick="confirmUpdate()">Lưu</button>
            <button class="cancel" onclick="closeUpdateInfoModal()">Hủy</button>
        </div>
    </div>

    <script>
        const oldPassword = "Khach123@"; // Mật khẩu cũ giả định
    
        function showChangePasswordModal() {
            document.getElementById("change-password-modal").style.display = "flex";
        }
    
        function closeChangePasswordModal() {
            document.getElementById("change-password-modal").style.display = "none";
        }
    
        function changePassword() {
            const currentPassword = document.getElementById("current-password").value;
            const newPassword = document.getElementById("new-password").value;
            const confirmNewPassword = document.getElementById("confirm-new-password").value;
    
            if (!currentPassword || !newPassword || !confirmNewPassword) {
                alert("Vui lòng nhập đầy đủ thông tin!");
                return;
            }
    
            if (currentPassword !== oldPassword) {
                alert("Mật khẩu cũ không đúng!");
                return;
            }
    
            const passwordRegex = /^(?=.*[A-Z])(?=.*[!@#$%^&*])(?=.*[a-zA-Z]).{8,}$/;
            if (!passwordRegex.test(newPassword)) {
                alert("Mật khẩu mới phải có ít nhất 8 ký tự, bao gồm ký tự in hoa và ký tự đặc biệt!");
                return;
            }
    
            if (newPassword !== confirmNewPassword) {
                alert("Mật khẩu mới và xác nhận mật khẩu không khớp!");
                return;
            }
    
            alert("Mật khẩu đã được thay đổi thành công!");
            closeChangePasswordModal();
        }
    
        function showUpdateInfoModal() {
            document.getElementById("update-info-modal").style.display = "flex";
        }
    
        function closeUpdateInfoModal() {
            document.getElementById("update-info-modal").style.display = "none";
        }
    
        function confirmUpdate() {
            alert("Thông tin cá nhân đã được cập nhật thành công!");
            closeUpdateInfoModal();
        }
    
        function showLogoutModal() {
            alert("Bạn đã đăng xuất!");
            window.location.href = "trangchu_chuadangnhap.html"; // Chuyển hướng đến file trangchua.html
        }
    
        function redirectToOverview() {
            window.location.href = "tongquankhach.html"; // Chuyển hướng sang file trangchukhach
        }
    </script>
</body>
</html>
