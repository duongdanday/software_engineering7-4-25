<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt vé</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body {
            display: flex;
            min-height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .sidebar {
            width: 250px;
            background-color: #b71c1c; /* Màu đỏ */
            color: white;
            padding: 15px;
            position: fixed;
            height: 100%;
        }

        .sidebar h5 {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }

        .sidebar a {
            color: white;
            text-decoration: none;
            display: block;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 5px;
        }

        .sidebar a:hover, .sidebar a.active {
            background-color: #ff9800; /* Màu cam khi hover */
            font-weight: bold;
        }

        .content {
            margin-left: 260px; /* Đẩy nội dung sang phải để không bị che bởi sidebar */
            padding: 20px;
            width: 100%;
        }

        .content h2 {
            color: #b71c1c;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <!-- Thanh Sidebar bên trái -->
    <div class="sidebar">
        <h5 class="mt-3">RẠP CHIẾU PHIM</h5>
        <a href="tongquankhach.html">Tổng quan</a>
        <h5 class="mt-3">QUẢN LÝ TÀI KHOẢN</h5>
        <a href="thongtincanhankhach.html">Thông tin cá nhân</a>
        <a href="#">Lịch sử đặt phim</a>
        <h5 class="mt-3">KHÁCH HÀNG</h5>
        <a href="#">Xem thông tin phim</a>
        <a href="#">Xem thông tin lịch chiếu</a>
        <a href="#">Đặt vé</a>
    </div>

    <!-- Nội dung chính -->
    <div class="content">
        <h2 class="text-center">Hệ Thống Đặt Vé Xem Phim</h2>
        
        <div class="mb-3">
            <label class="form-label">Chọn phim</label>
            <div id="movie-buttons" class="d-flex flex-wrap"></div>
        </div>
        
        <div class="mb-3">
            <label class="form-label">Chọn lịch chiếu</label>
            <div id="session-buttons" class="d-flex flex-wrap"></div>
        </div>
        
        <div class="mb-3">
            <label class="form-label">Chọn loại vé</label>
            <div id="ticket-buttons" class="d-flex flex-wrap"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Số lượng vé</label>
            <input type="number" id="ticket-quantity" class="form-control" min="1" value="1">
        </div>
        
        <!-- Nút Đặt vé -->
        <button id="placeOrderBtn" class="btn btn-danger w-100" onclick="confirmBooking()">Đặt vé</button>
        
        <h2 class="text-center mt-4">Danh sách vé</h2>
        <div id="ticket-list" class="ticket-list text-center">Chưa có vé nào.</div>
    </div>
    
    <script>
        const movies = [
            { id: 1, name: "Phim A", sessions: ["10:00", "14:00", "18:00"] },
            { id: 2, name: "Phim B", sessions: ["11:00", "15:00", "19:00"] }
        ];
        
        const tickets = [
            { type: "Ghế Thường", price: 100000 },
            { type: "Ghế VIP", price: 150000 }
        ];
        
        let selectedMovie = null;
        let selectedSession = null;
        let selectedTicket = null;
        let bookings = [];

        function updateMovieOptions() {
            const movieButtons = document.getElementById("movie-buttons");
            movieButtons.innerHTML = "";
            movies.forEach(movie => {
                const btn = document.createElement("button");
                btn.className = "btn btn-outline-danger movie-btn"; // Đổi màu nút thành tone đỏ
                btn.textContent = movie.name;
                btn.onclick = () => selectMovie(movie, btn);
                movieButtons.appendChild(btn);
            });
        }

        function selectMovie(movie, button) {
            selectedMovie = movie;
            document.querySelectorAll('.movie-btn').forEach(btn => btn.classList.remove('btn-danger'));
            button.classList.add('btn-danger');
            updateSessionOptions(movie.sessions);
        }

        function updateSessionOptions(sessions) {
            const sessionButtons = document.getElementById("session-buttons");
            sessionButtons.innerHTML = "";
            sessions.forEach(session => {
                const btn = document.createElement("button");
                btn.className = "btn btn-outline-danger session-btn"; // Đổi màu nút thành tone đỏ
                btn.textContent = session;
                btn.onclick = () => selectSession(session, btn);
                sessionButtons.appendChild(btn);
            });
        }

        function selectSession(session, button) {
            selectedSession = session;
            document.querySelectorAll('.session-btn').forEach(btn => btn.classList.remove('btn-danger'));
            button.classList.add('btn-danger');
            updateTicketOptions();
        }

        function updateTicketOptions() {
            const ticketButtons = document.getElementById("ticket-buttons");
            ticketButtons.innerHTML = "";
            tickets.forEach(ticket => {
                const btn = document.createElement("button");
                btn.className = "btn btn-outline-danger ticket-btn"; // Đổi màu nút thành tone đỏ
                btn.textContent = `${ticket.type} - ${ticket.price.toLocaleString()} VND`;
                btn.onclick = () => selectTicket(ticket, btn);
                ticketButtons.appendChild(btn);
            });
        }

        function selectTicket(ticket, button) {
            selectedTicket = ticket;
            document.querySelectorAll('.ticket-btn').forEach(btn => btn.classList.remove('btn-danger'));
            button.classList.add('btn-danger');
        }

        function confirmBooking() {
    const quantity = parseInt(document.getElementById("ticket-quantity").value);
    if (!selectedMovie || !selectedSession || !selectedTicket || quantity < 1) {
        Swal.fire('Lỗi!', 'Vui lòng chọn đầy đủ thông tin và nhập số lượng hợp lệ!', 'error');
        return;
    }

    const totalPrice = selectedTicket.price * quantity;

    Swal.fire({
        title: 'Xác nhận đặt vé',
        html: ` 
            <p><b>Phim:</b> ${selectedMovie.name}</p>
            <p><b>Suất chiếu:</b> ${selectedSession}</p>
            <p><b>Loại vé:</b> ${selectedTicket.type}</p>
            <p><b>Số lượng:</b> ${quantity}</p>
            <p><b>Tổng giá:</b> ${totalPrice.toLocaleString()} VND</p>
        `,
        icon: 'question',
        showCancelButton: true,
        confirmButtonText: 'Xác nhận',
        cancelButtonText: 'Hủy'
    }).then((result) => {
        if (result.isConfirmed) {
            bookings.push({ 
                movie: selectedMovie.name, 
                session: selectedSession, 
                ticket: selectedTicket, 
                quantity: quantity, 
                totalPrice: totalPrice 
            });
            updateBookingList();
            Swal.fire('Thành công!', 'Vé đã được đặt.', 'success');

            // Đặt lại giao diện về trạng thái ban đầu
            resetInterface();
        }
    });
}

function resetInterface() {
    // Đặt lại các biến
    selectedMovie = null;
    selectedSession = null;
    selectedTicket = null;

    // Xóa các lựa chọn nút
    document.querySelectorAll('.movie-btn').forEach(btn => btn.classList.remove('btn-danger'));
    document.querySelectorAll('.session-btn').forEach(btn => btn.classList.remove('btn-danger'));
    document.querySelectorAll('.ticket-btn').forEach(btn => btn.classList.remove('btn-danger'));

    // Đặt lại số lượng vé về 1
    document.getElementById("ticket-quantity").value = 1;
}

        function deleteBooking(index) {
            bookings.splice(index, 1);
            updateBookingList();
        }

        function updateBookingList() {
            const ticketList = document.getElementById('ticket-list');
            if (bookings.length === 0) {
                ticketList.innerHTML = 'Chưa có vé nào.';
            } else {
                ticketList.innerHTML = bookings.map((b, index) => 
                    `<div class="d-flex justify-content-between align-items-center p-2 border-bottom">
                        ${b.movie} (${b.session}) - ${b.ticket.type} - Số lượng: ${b.quantity} - Tổng: ${b.totalPrice.toLocaleString()} VND
                        <button class="btn btn-danger btn-sm" onclick="deleteBooking(${index})">Xóa</button>
                    </div>`).join('');
            }
        }

        updateMovieOptions();
    </script>
</body>
</html>
