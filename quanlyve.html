<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quản lý vé</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
  <style>
    body {
      display: flex;
      margin: 0;
      padding: 0;
      background-color: #ffebee; 
      font-family: 'Segoe UI', sans-serif;
    }

    .sidebar {
      width: 250px;
      background: #b71c1c;
      color: white;
      padding: 20px;
      position: fixed;
      height: 100vh;
      top: 0;
      left: 0;
    }

    .sidebar a {
      color: white;
      text-decoration: none;
      display: block;
      padding: 10px;
      border-radius: 5px;
      margin-bottom: 10px;
    }

    .sidebar a:hover, .sidebar a.active {
      background: #ff9800;
      font-weight: bold;
    }

    .content {
      margin-left: 260px;
      padding: 20px;
      width: calc(100% - 260px);
    }

    .chart-container {
      background: #ffffff;
      padding: 20px;
      border-radius: 10px;
      border: 2px solid #d32f2f;
      box-shadow: 0px 0px 15px rgba(211, 47, 47, 0.2);
      margin-top: 20px;
    }

    h2 {
      color: #b71c1c;
    }

    .form-control:focus {
      border-color: #d32f2f;
      box-shadow: 0 0 0 0.15rem rgba(211, 47, 47, 0.25);
    }

    .btn-danger {
      background-color: #d32f2f;
      border-color: #c62828;
    }

    .btn-danger:hover {
      background-color: #b71c1c;
      border-color: #b71c1c;
    }

    .table thead {
      background-color: #b71c1c;
      color: white;
    }

    .btn-warning {
      background-color: #ff9800;
      border-color: #fb8c00;
    }

    .btn-warning:hover {
      background-color: #fb8c00;
    }
  </style>
</head>
<body>
  <!-- Thanh điều hướng bên trái -->

  <div class="sidebar">
    <h5 class="mt-3">RẠP CHIẾU PHIM</h5>
    <a href="tongquanadmin.html" onclick="showSection('overview')">Tổng quan</a>
    <a href="quanlynguoidung.html" onclick="showSection('users')">Quản lý người dùng</a>
    <a href="quanlyve.html" onclick="showSection('tickets')">Quản lý vé</a>
    <a href="quanlylichchieuphim.html" onclick="showSection('schedule')">Quản lý lịch chiếu</a>
    <a href="quanlynhanvien.html" onclick="showSection('employees')">Quản lý nhân viên</a>
    <a href="thongke.html" onclick="showSection('stats')">Thống kê</a>
    <a href="quanlyphim.html" onclick="showSection('movies')">Quản lý phim</a>
    <a href="quanlyphongchieu_banquanly.html" onclick="showSection('rooms')">Quản lý phòng chiếu</a>
    <a href="thongtincanhan_banquanly.html" onclick="showSection('rooms')">Thông tin cá nhân</a>
</div>

  <!-- Nội dung trang -->
  <div class="content">
    <div class="chart-container">
      <h2 class="text-center">Quản lý vé</h2>
      <div class="mb-3">
        <input type="text" id="movieInput" class="form-control mb-2" placeholder="Nhập tên phim">
        <input type="text" id="roomInput" class="form-control mb-2" placeholder="Nhập phòng chiếu">
        <input type="text" id="seatInput" class="form-control mb-2" placeholder="Nhập vị trí ngồi">
        <input type="number" id="priceInput" class="form-control mb-2" placeholder="Nhập giá vé">
        <input type="datetime-local" id="timeInput" class="form-control mb-2">
        <button class="btn btn-danger" onclick="confirmCreateTicket()">Tạo vé</button>
      </div>
      <table class="table table-bordered table-striped text-center">
        <thead>
          <tr>
            <th>ID</th>
            <th>Phim</th>
            <th>Phòng chiếu</th>
            <th>Vị trí ngồi</th>
            <th>Giá vé</th>
            <th>Thời gian</th>
            <th>Hành động</th>
          </tr>
        </thead>
        <tbody id="ticketList"></tbody>
      </table>
    </div>
  </div>

  <script>
    let ticketId = 1;

    function confirmCreateTicket() {
      let movie = document.getElementById("movieInput").value.trim();
      let room = document.getElementById("roomInput").value.trim();
      let seat = document.getElementById("seatInput").value.trim();
      let price = document.getElementById("priceInput").value.trim();
      let time = document.getElementById("timeInput").value;

      if (!movie || !room || !seat || !price || !time) {
        alert("Vui lòng nhập đầy đủ thông tin vé");
        return;
      }

      let confirmation = confirm(`Xác nhận tạo vé:\nPhim: ${movie}\nPhòng: ${room}\nVị trí: ${seat}\nGiá: ${price}\nThời gian: ${time}`);
      if (confirmation) {
        createTicket(movie, room, seat, price, time);
      }
    }

    function createTicket(movie, room, seat, price, time) {
      let table = document.getElementById("ticketList");
      let row = table.insertRow();
      row.innerHTML = `<td>${ticketId}</td>
                       <td contenteditable="true">${movie}</td>
                       <td contenteditable="true">${room}</td>
                       <td contenteditable="true">${seat}</td>
                       <td contenteditable="true">${price}</td>
                       <td contenteditable="true">${time}</td>
                       <td>
                         <button class="btn btn-sm btn-warning me-1" onclick="confirmUpdateTicket(this)">Cập nhật</button>
                         <button class="btn btn-sm btn-danger" onclick="confirmDeleteTicket(this)">Xóa</button>
                       </td>`;
      ticketId++;
      clearInputs();
    }

    function confirmUpdateTicket(button) {
      if (confirm("Xác nhận cập nhật thông tin vé?")) {
        alert("Cập nhật thành công!");
      }
    }

    function confirmDeleteTicket(button) {
      if (confirm("Bạn có chắc chắn muốn xóa vé này?")) {
        let row = button.parentElement.parentElement;
        row.remove();
        alert("Xóa vé thành công!");
      }
    }

    function clearInputs() {
      document.getElementById("movieInput").value = "";
      document.getElementById("roomInput").value = "";
      document.getElementById("seatInput").value = "";
      document.getElementById("priceInput").value = "";
      document.getElementById("timeInput").value = "";
    }
  </script>
</body>
</html>
