<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang chủ</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            display: flex;
            min-height: 100vh;
            background-color: #fbe9e7;
        }
        .sidebar {
            width: 250px;
            background: #b71c1c;
            color: white;
            padding: 15px;
            position: fixed;
            height: 100%;
        }
        .sidebar a {
            color: white;
            text-decoration: none;
            display: block;
            padding: 10px;
            border-radius: 5px;
        }
        .sidebar a:hover, .sidebar a.active {
            background: #ff9800;
            font-weight: bold;
        }
        .content {
            margin-left: 260px;
            padding: 20px;
            width: 100%;
        }
        .header {
            background: #d32f2f;
            padding: 15px;
            text-align: right;
            font-weight: bold;
            color: white;
        }
        .chart-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background-color: #fbe9e7;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            color: #d32f2f;
            font-weight: bold;
        }
        .circle h3 {
            margin: 0;
            font-size: 28px;
        }
        .circle-text {
            margin-top: 10px;
            font-size: 16px;
            color: #d32f2f;
            font-weight: bold;
        }
        .room-management {
            display: none; /* Ẩn mặc định */
            margin-left: 50px;
        }
        .room-management input {
            width: 80%;
            padding: 8px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .room-list {
            margin-top: 20px;
            text-align: left;
        }
        .room-list ul {
            list-style-type: none;
            padding: 0;
        }
        .room-list li {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .room-list button {
            background: #f44336;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
        }
        .room-list button:hover {
            background: #d32f2f;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h5 class="mt-3">RẠP CHIẾU PHIM</h5>
        <a href="#" onclick="showOverview()">Tổng quan</a>
        <a href="thongtincanhanadminphongchieu.html">Thông tin cá nhân</a> 
        <a href="quanlyphongchieu.html">Quản lý phòng chiếu</a> <!-- Chuyển hướng trực tiếp -->
    </div>
    
    <div class="content">
        <div class="header">Nguyễn Văn B | Nhân viên quản lý phòng chiếu</div>
        
        <div class="chart-container" id="chart-container">
            <div class="circle">
                <h3 id="total-rooms-circle">15</h3>
            </div>
            <p class="circle-text">Số phòng đã tạo thành công</p>
        </div>

        <div class="room-management" id="room-management">
            <h3>Quản lý phòng chiếu</h3>
            <input type="text" id="room-name" placeholder="Tên phòng chiếu">
            <button onclick="addRoom()">Thêm phòng chiếu</button>
            <div class="room-list" id="room-list">
                <h5>Danh sách phòng chiếu</h5>
                <ul id="room-list-ul">
                    <!-- Danh sách phòng chiếu sẽ được thêm tại đây -->
                </ul>
            </div>
        </div>
    </div>

    <script>
        function updateRoomStatistics() {
            const totalRooms = document.getElementById("room-list-ul").children.length;
            document.getElementById("total-rooms-circle").textContent = totalRooms;
        }

        function showOverview() {
            document.getElementById("chart-container").style.display = "flex";
            document.getElementById("room-management").style.display = "none";
        }

        function addRoom() {
            const roomName = document.getElementById("room-name").value;
            if (!roomName) {
                alert("Vui lòng nhập tên phòng chiếu!");
                return;
            }

            const roomListUl = document.getElementById("room-list-ul");
            const li = document.createElement("li");
            li.innerHTML = `
                ${roomName}
                <button onclick="deleteRoom(this)">Xóa</button>
            `;
            roomListUl.appendChild(li);
            document.getElementById("room-name").value = "";
            updateRoomStatistics();
        }

        function deleteRoom(button) {
            const li = button.parentElement;
            li.remove();
            updateRoomStatistics();
        }
    </script>
</body>
</html>
