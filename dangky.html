<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Quản lý rạp chiếu phim</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: url('nen.jpg') no-repeat center center/cover;
        }
        .login-container {
            background: rgba(255, 255, 255, 0.3); /* Màu trắng với độ trong suốt 80% */
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
            width: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .login-container h2 {
            text-align: center;
        }
        .login-container input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            text-align: center;
        }
        .login-container button {
            width: 95%;
            padding: 10px;
            background: #D32F2F;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-align: center;
        }
        .login-container button:hover {
            background: #B71C1C;
        }
        .login-container p {
            margin-top: 10px;
            font-size: 14px;
        }
        .login-container a {
            color: #D32F2F;
            text-decoration: none;
            font-weight: bold;
        }
        .login-container a:hover {
            text-decoration: underline;
        }

        /* Modal styles */
        .modal {
            display: none; /* Ẩn modal mặc định */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5); /* Nền mờ */
            justify-content: center;
            align-items: center;
            z-index: 1000; /* Nổi lên trên tất cả */
        }
        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.3);
            width: 300px;
            text-align: center;
        }
        .modal-content input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .modal-content button {
            padding: 10px 20px;
            background: #D32F2F;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .modal-content button:hover {
            background: #B71C1C;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Đăng ký tài khoản</h2>
        <input type="text" id="username" placeholder="Tên đăng nhập">
        <input type="password" id="password" placeholder="Mật khẩu">
        <button onclick="login()">Đăng ký</button>
        <p>Đã có tài khoản? <a href="dangnhap.html">Đăng nhập ngay</a></p>
        <p><a href="trangchu_chuadangnhap.html" style="color: #D32F2F; text-decoration: none; font-weight: bold;">Trở về trang chủ</a></p>
    </div>

    <!-- Modal nhập số điện thoại hoặc email -->
    <div class="modal" id="modal-contact">
        <div class="modal-content">
            <h3>Nhập số điện thoại hoặc email</h3>
            <input type="text" id="contact-info" placeholder="Số điện thoại hoặc email">
            <button onclick="submitContact()">Xác nhận</button>
        </div>
    </div>

    <!-- Modal nhập mã xác nhận -->
    <div class="modal" id="modal-code">
        <div class="modal-content">
            <h3>Nhập mã xác nhận</h3>
            <input type="text" id="verification-code" placeholder="Nhập mã xác nhận">
            <button onclick="submitCode()">Xác nhận mã</button>
        </div>
    </div>

    <script>
        function login() {
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
    
            if (password === "Admin123@" || password === "Khach123@") {
                // Hiển thị modal nhập số điện thoại hoặc email
                const modalContact = document.getElementById("modal-contact");
                modalContact.style.display = "flex";
            } else {
                alert("Mật khẩu không hợp lệ!");
            }
        }
    
        function submitContact() {
            const contactInfo = document.getElementById("contact-info").value;
            if (contactInfo) {
                alert("Thông tin đã được gửi: " + contactInfo);
                // Ẩn modal nhập số điện thoại hoặc email
                const modalContact = document.getElementById("modal-contact");
                modalContact.style.display = "none";
    
                // Hiển thị modal nhập mã xác nhận
                const modalCode = document.getElementById("modal-code");
                modalCode.style.display = "flex";
            } else {
                alert("Vui lòng nhập số điện thoại hoặc email!");
            }
        }
    
        function submitCode() {
            const verificationCode = document.getElementById("verification-code").value;
            if (verificationCode === "1234") {
                alert("Đăng ký thành công!");
                // Chuyển hướng sang đăng nhập 
                window.location.href = "dangnhap.html";
            } else {
                alert("Mã không đúng, vui lòng nhập lại!");
            }
        }
    </script>
</body>
</html>
