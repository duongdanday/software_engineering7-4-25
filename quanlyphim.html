<body>

  <div class="content">
    <div class="header"><h2>Quản lý phim</h2></div>

    <div class="chart-container" id="chartContainer">
      <!-- Nội dung động -->
    </div>
  </div>

  <script>
    const movies = [];

    const renderMovieManager = () => {
      const chartContainer = document.getElementById('chartContainer');
      chartContainer.innerHTML = `
        <h4>Quản lý phim</h4>
        <div class="mb-3">
          <input type="text" id="movieName" class="form-control mb-2" placeholder="Tên phim">
          <input type="text" id="movieId" class="form-control mb-2" placeholder="Mã phim">
          <input type="text" id="movieGenre" class="form-control mb-2" placeholder="Thể loại">
          <input type="number" id="movieDuration" class="form-control mb-2" placeholder="Thời lượng (phút)">
        </div>
        <button class="btn btn-success mb-2" id="addMovie">Thêm phim</button>
        <button class="btn btn-danger mb-2" id="deleteMovie">Xóa phim</button>
        <button class="btn btn-warning mb-2" id="updateMovie">Cập nhật phim</button>
        <div id="movieActionsResult" class="mt-3"></div>
        <div id="movieList" class="mt-3">
          <h5>Danh sách phim</h5>
          <div id="movieListContainer"></div>
        </div>
      `;

      const updateMovieList = () => {
        const container = document.getElementById('movieListContainer');
        if (movies.length === 0) {
          container.innerHTML = `<p>Chưa có phim nào.</p>`;
          return;
        }

        container.innerHTML = `
          <table class="table table-bordered">
            <thead>
              <tr>
                <th>Tên phim</th>
                <th>Mã phim</th>
                <th>Thể loại</th>
                <th>Thời lượng (phút)</th>
              </tr>
            </thead>
            <tbody>
              ${movies.map(movie => `
                <tr>
                  <td>${movie.name}</td>
                  <td>${movie.id}</td>
                  <td>${movie.genre}</td>
                  <td>${movie.duration}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
      };

      const getInputValues = () => ({
        name: document.getElementById('movieName').value.trim(),
        id: document.getElementById('movieId').value.trim(),
        genre: document.getElementById('movieGenre').value.trim(),
        duration: document.getElementById('movieDuration').value.trim()
      });

      document.getElementById('addMovie').addEventListener('click', () => {
        const { name, id, genre, duration } = getInputValues();
        const result = document.getElementById('movieActionsResult');

        if (!name || !id || !genre || !duration) {
          result.innerHTML = `<div class="alert alert-danger">Vui lòng nhập đầy đủ thông tin.</div>`;
          return;
        }

        if (movies.some(m => m.id === id)) {
          result.innerHTML = `<div class="alert alert-warning">Mã phim đã tồn tại.</div>`;
          return;
        }

        movies.push({ name, id, genre, duration });
        result.innerHTML = `<div class="alert alert-success">Thêm phim thành công.</div>`;
        updateMovieList();
      });

      document.getElementById('deleteMovie').addEventListener('click', () => {
        const { id } = getInputValues();
        const index = movies.findIndex(m => m.id === id);
        const result = document.getElementById('movieActionsResult');

        if (index === -1) {
          result.innerHTML = `<div class="alert alert-danger">Không tìm thấy phim để xóa.</div>`;
          return;
        }

        movies.splice(index, 1);
        result.innerHTML = `<div class="alert alert-success">Đã xóa phim.</div>`;
        updateMovieList();
      });

      document.getElementById('updateMovie').addEventListener('click', () => {
        const { name, id, genre, duration } = getInputValues();
        const movie = movies.find(m => m.id === id);
        const result = document.getElementById('movieActionsResult');

        if (!movie) {
          result.innerHTML = `<div class="alert alert-danger">Không tìm thấy mã phim để cập nhật.</div>`;
          return;
        }

        movie.name = name || movie.name;
        movie.genre = genre || movie.genre;
        movie.duration = duration || movie.duration;
        result.innerHTML = `<div class="alert alert-success">Cập nhật phim thành công.</div>`;
        updateMovieList();
      });

      updateMovieList();
    };

    document.addEventListener('DOMContentLoaded', function () {
      document.querySelectorAll('.sidebar a').forEach(link => link.style.display = 'block');
      document.getElementById('manageMovies').addEventListener('click', function (e) {
        e.preventDefault();
        renderMovieManager();
      });

      // Gọi mặc định khi trang load
      document.getElementById('manageMovies').click();
    });
  </script>
</body>
